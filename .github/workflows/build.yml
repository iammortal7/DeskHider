name: Build DeskHider

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download AutoHotkey v2 and Ahk2Exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ahkVersion = "2.0.26"
          $compilerTag = "Ahk2Exe1.1.37.02a2"

          Invoke-WebRequest `
            "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkVersion/AutoHotkey_$ahkVersion.zip" `
            -OutFile "AutoHotkey.zip"

          Invoke-WebRequest `
            "https://github.com/AutoHotkey/Ahk2Exe/releases/download/$compilerTag/$compilerTag.zip" `
            -OutFile "Ahk2Exe.zip"

          Expand-Archive "AutoHotkey.zip" -DestinationPath "tools/AutoHotkey"
          Expand-Archive "Ahk2Exe.zip" -DestinationPath "tools/Ahk2Exe"

      - name: Compile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          New-Item -ItemType Directory -Force -Path "dist" | Out-Null

          $compiler = Get-ChildItem "tools/Ahk2Exe" -Recurse -Filter "Ahk2Exe.exe" |
            Select-Object -First 1
          $base = Get-ChildItem "tools/AutoHotkey" -Recurse -Filter "AutoHotkey64.exe" |
            Select-Object -First 1

          if (-not $compiler) { throw "Ahk2Exe.exe was not found." }
          if (-not $base) { throw "AutoHotkey64.exe was not found." }

          & $compiler.FullName `
            /in "$PWD/DeskHider.ahk" `
            /out "$PWD/dist/DeskHider.exe" `
            /base $base.FullName `
            /silent verbose

          if (-not (Test-Path "dist/DeskHider.exe")) {
            throw "Compilation did not produce DeskHider.exe."
          }

          $hash = (Get-FileHash "dist/DeskHider.exe" -Algorithm SHA256).Hash.ToLower()
          "$hash  DeskHider.exe" | Set-Content "dist/DeskHider.sha256" -NoNewline

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskHider
          path: |
            dist/DeskHider.exe
            dist/DeskHider.sha256

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"

          if (gh release view $tag 2>$null) {
            gh release upload $tag `
              "dist/DeskHider.exe" `
              "dist/DeskHider.sha256" `
              --clobber
          } else {
            gh release create $tag `
              "dist/DeskHider.exe" `
              "dist/DeskHider.sha256" `
              --title "DeskHider $tag" `
              --generate-notes
          }
