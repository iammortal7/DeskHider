name: Build DeskHider

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Download AutoHotkey v2 and Ahk2Exe
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"
          $ahkVersion = "2.0.26"
          $compilerTag = "Ahk2Exe1.1.37.02a2"

          Invoke-WebRequest `
            "https://github.com/AutoHotkey/AutoHotkey/releases/download/v$ahkVersion/AutoHotkey_$ahkVersion.zip" `
            -OutFile "AutoHotkey.zip"

          Invoke-WebRequest `
            "https://github.com/AutoHotkey/Ahk2Exe/releases/download/$compilerTag/$compilerTag.zip" `
            -OutFile "Ahk2Exe.zip"

          Expand-Archive "AutoHotkey.zip" -DestinationPath "tools/AutoHotkey"
          Expand-Archive "Ahk2Exe.zip" -DestinationPath "tools/Ahk2Exe"

      - name: Compile
        shell: pwsh
        run: |
          $ErrorActionPreference = "Stop"

          $repo = $env:GITHUB_WORKSPACE
          $inputFile = Join-Path $repo "DeskHider.ahk"
          $outputDir = Join-Path $repo "dist"
          $outputFile = Join-Path $outputDir "DeskHider.exe"
          $checksumFile = Join-Path $outputDir "DeskHider.sha256"

          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null

          $compiler = Get-ChildItem (Join-Path $repo "tools/Ahk2Exe") `
            -Recurse -Filter "Ahk2Exe.exe" |
            Select-Object -First 1

          $base = Get-ChildItem (Join-Path $repo "tools/AutoHotkey") `
            -Recurse -Filter "AutoHotkey64.exe" |
            Select-Object -First 1

          if (-not $compiler) { throw "Ahk2Exe.exe was not found." }
          if (-not $base) { throw "AutoHotkey64.exe was not found." }
          if (-not (Test-Path -LiteralPath $inputFile)) {
            throw "DeskHider.ahk was not found."
          }

          # Ahk2Exe is a GUI executable. Start-Process -Wait prevents the
          # workflow from checking for the output before compilation finishes.
          $arguments = @(
            "/in", $inputFile,
            "/out", $outputFile,
            "/base", $base.FullName,
            "/silent", "verbose"
          )

          $process = Start-Process `
            -FilePath $compiler.FullName `
            -ArgumentList $arguments `
            -Wait `
            -PassThru

          if ($process.ExitCode -ne 0) {
            throw "Ahk2Exe failed with exit code $($process.ExitCode)."
          }

          # Allow a brief period for the final file move to become visible.
          $deadline = (Get-Date).AddSeconds(10)
          while (-not (Test-Path -LiteralPath $outputFile) -and
                 (Get-Date) -lt $deadline) {
            Start-Sleep -Milliseconds 250
          }

          if (-not (Test-Path -LiteralPath $outputFile)) {
            Write-Host "Contents of the output directory:"
            Get-ChildItem -LiteralPath $outputDir -Force -Recurse |
              Format-Table FullName, Length
            throw "Compilation reported success but DeskHider.exe was not found."
          }

          $hash = (Get-FileHash -LiteralPath $outputFile -Algorithm SHA256).Hash.ToLower()
          "$hash  DeskHider.exe" |
            Set-Content -LiteralPath $checksumFile -NoNewline

          Write-Host "Built $outputFile"
          Write-Host "SHA-256: $hash"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: DeskHider
          path: |
            dist/DeskHider.exe
            dist/DeskHider.sha256
          if-no-files-found: error

      - name: Publish tagged release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"

          if (gh release view $tag 2>$null) {
            gh release upload $tag `
              "dist/DeskHider.exe" `
              "dist/DeskHider.sha256" `
              --clobber
          } else {
            gh release create $tag `
              "dist/DeskHider.exe" `
              "dist/DeskHider.sha256" `
              --title "DeskHider $tag" `
              --generate-notes
          }
